sudo: required
services:
  - docker

install: travis_wait mvn install

before_install:
  - docker build -t miko/docker-react -f Dockerfile.dev .

script:
  - docker run miko/docker-react npm run test -- --coverage

deploy:
  provider: elasticbeanstalk
  region: "eu-north-1"
  app: "frontend"
  env: "Frontend-env"
  bucket_name: "elasticbeanstalk-eu-north-1-594062863535"
  bukcet_path: "frontend"
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: "$AWS_SECRET_KEY"